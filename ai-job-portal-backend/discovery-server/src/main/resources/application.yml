server:
  port: ${PORT:8761}

spring:
  application:
    name: discovery-server

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    # The registry itself does not need to register with another peer
    # or fetch the registry, since it IS the registry (single-node setup).
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Disable self-preservation in local/dev so down instances are evicted
    # promptly instead of being kept artificially "up".
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId}]"
