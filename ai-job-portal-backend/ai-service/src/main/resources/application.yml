spring:
  application:
    name: ai-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# Local fallback values, used only if Config Server is unreachable at startup.
# Authoritative values live in config-repo/ai-service.yml.
server:
  port: ${PORT:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId}]"
