name: ai-job-portal

networks:
  ai-job-portal-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:

services:

  # ----------------------------------------------------------------------
  # PostgreSQL — single container, multiple databases (one per microservice)
  # ----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ai-job-portal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # No POSTGRES_DB set on purpose — per-service databases are created
      # by the init script below instead of relying on the single-DB
      # default behavior of the official image.
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------
  # Redis — caching + rate limiting
  # ----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai-job-portal-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------
  # Kafka — KRaft mode (no Zookeeper), single-broker, dev/local setup
  # ----------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.0
    container_name: ai-job-portal-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:${KAFKA_CONTROLLER_PORT:-9093}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:${KAFKA_CONTROLLER_PORT:-9093}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "ai-jobportal-kraft-cluster-01"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------
  # Discovery Server — Eureka
  # ----------------------------------------------------------------------
  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: ai-job-portal-discovery-server
    restart: unless-stopped
    ports:
      - "${EUREKA_PORT:-8761}:8761"
    environment:
      EUREKA_HOSTNAME: discovery-server
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------
  # Config Server — native file-based config, depends on Eureka being up
  # ----------------------------------------------------------------------
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: ai-job-portal-config-server
    restart: unless-stopped
    ports:
      - "${CONFIG_SERVER_PORT:-8888}:8888"
    environment:
      CONFIG_REPO_PATH: /config-repo
      EUREKA_URI: http://discovery-server:8761/eureka/
    volumes:
      - ./config-repo:/config-repo:ro
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------
  # API Gateway — depends on Config Server, Eureka, and Redis
  # ----------------------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: ai-job-portal-api-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      CONFIG_SERVER_URI: http://config-server:8888
      EUREKA_URI: http://discovery-server:8761/eureka/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------
  # Auth Service — owns Authentication, Authorization, Users, Roles,
  # JWT issuance/validation, and Refresh Tokens. Depends on Config Server,
  # Eureka, Postgres, Redis, and Kafka being available at startup.
  # ----------------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: ai-job-portal-auth-service
    restart: unless-stopped
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    environment:
      CONFIG_SERVER_URI: http://config-server:8888
      EUREKA_URI: http://discovery-server:8761/eureka/
      AUTH_DB_HOST: postgres
      AUTH_DB_PORT: 5432
      AUTH_DB_NAME: auth_service_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-900000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-604800000}
      EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS: ${EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS:-86400000}
      PASSWORD_RESET_TOKEN_EXPIRATION_MS: ${PASSWORD_RESET_TOKEN_EXPIRATION_MS:-3600000}
      MAX_FAILED_LOGIN_ATTEMPTS: ${MAX_FAILED_LOGIN_ATTEMPTS:-5}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM: ${MAIL_FROM:-no-reply@aijobportal.com}
      FRONTEND_VERIFY_EMAIL_URL: ${FRONTEND_VERIFY_EMAIL_URL:-http://localhost:5173/verify-email}
      FRONTEND_RESET_PASSWORD_URL: ${FRONTEND_RESET_PASSWORD_URL:-http://localhost:5173/reset-password}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ----------------------------------------------------------------------
  # Candidate Service — owns Candidate Profile, Resume, Education,
  # Experience, and Skills. Depends on Config Server, Eureka, Postgres,
  # Kafka, and Auth Service (queried via Feign/Eureka at runtime) being
  # available at startup.
  # ----------------------------------------------------------------------
  candidate-service:
    build:
      context: .
      dockerfile: candidate-service/Dockerfile
    container_name: ai-job-portal-candidate-service
    restart: unless-stopped
    ports:
      - "${CANDIDATE_SERVICE_PORT:-8082}:8082"
    environment:
      CONFIG_SERVER_URI: http://config-server:8888
      EUREKA_URI: http://discovery-server:8761/eureka/
      CANDIDATE_DB_HOST: postgres
      CANDIDATE_DB_PORT: 5432
      CANDIDATE_DB_NAME: candidate_service_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RESUME_MAX_FILE_SIZE: ${RESUME_MAX_FILE_SIZE:-10MB}
      RESUME_MAX_REQUEST_SIZE: ${RESUME_MAX_REQUEST_SIZE:-10MB}
      RESUME_MAX_FILE_SIZE_BYTES: ${RESUME_MAX_FILE_SIZE_BYTES:-10485760}
      RESUME_CLOUDINARY_FOLDER: ${RESUME_CLOUDINARY_FOLDER:-ai-job-portal/resumes}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ----------------------------------------------------------------------
  # Recruiter Service — owns Company, Recruiter Profile, and Company
  # Verification. Depends on Config Server, Eureka, Postgres, Kafka, and
  # Auth Service (queried via Feign/Eureka at runtime) being available.
  # ----------------------------------------------------------------------
  recruiter-service:
    build:
      context: .
      dockerfile: recruiter-service/Dockerfile
    container_name: ai-job-portal-recruiter-service
    restart: unless-stopped
    ports:
      - "${RECRUITER_SERVICE_PORT:-8083}:8083"
    environment:
      CONFIG_SERVER_URI: http://config-server:8888
      EUREKA_URI: http://discovery-server:8761/eureka/
      RECRUITER_DB_HOST: postgres
      RECRUITER_DB_PORT: 5432
      RECRUITER_DB_NAME: recruiter_service_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      COMPANY_ASSET_MAX_FILE_SIZE: ${COMPANY_ASSET_MAX_FILE_SIZE:-5MB}
      COMPANY_ASSET_MAX_REQUEST_SIZE: ${COMPANY_ASSET_MAX_REQUEST_SIZE:-5MB}
      COMPANY_ASSET_MAX_FILE_SIZE_BYTES: ${COMPANY_ASSET_MAX_FILE_SIZE_BYTES:-5242880}
      COMPANY_LOGO_CLOUDINARY_FOLDER: ${COMPANY_LOGO_CLOUDINARY_FOLDER:-ai-job-portal/company-logos}
      COMPANY_BANNER_CLOUDINARY_FOLDER: ${COMPANY_BANNER_CLOUDINARY_FOLDER:-ai-job-portal/company-banners}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ----------------------------------------------------------------------
  # Job Service — owns Jobs, Job Categories, Saved Jobs, Job Alerts
  # ----------------------------------------------------------------------
  job-service:
    build:
      context: .
      dockerfile: job-service/Dockerfile
    container_name: ai-job-portal-job-service
    restart: unless-stopped
    ports:
      - "${JOB_SERVICE_PORT:-8084}:8084"
    environment:
      CONFIG_SERVER_URI: http://config-server:8888
      EUREKA_URI: http://discovery-server:8761/eureka/
      JOB_DB_HOST: postgres
      JOB_DB_PORT: 5432
      JOB_DB_NAME: job_service_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      recruiter-service:
        condition: service_healthy
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ----------------------------------------------------------------------
  # Application Service — Job Applications, Timeline, Hiring Workflow
  # ----------------------------------------------------------------------
  application-service:
    build:
      context: .
      dockerfile: application-service/Dockerfile
    container_name: ai-job-portal-application-service
    restart: unless-stopped
    ports:
      - "${APPLICATION_SERVICE_PORT:-8085}:8085"
    environment:
      CONFIG_SERVER_URI: http://config-server:8888
      EUREKA_URI: http://discovery-server:8761/eureka/
      APPLICATION_DB_HOST: postgres
      APPLICATION_DB_PORT: 5432
      APPLICATION_DB_NAME: application_service_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      job-service:
        condition: service_healthy
      candidate-service:
        condition: service_healthy
      recruiter-service:
        condition: service_healthy
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ----------------------------------------------------------------------
  # AI Service — Resume Analysis, Recommendations, Interview Questions
  # ----------------------------------------------------------------------
  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: ai-job-portal-ai-service
    restart: unless-stopped
    ports:
      - "${AI_SERVICE_PORT:-8086}:8086"
    environment:
      CONFIG_SERVER_URI: http://config-server:8888
      EUREKA_URI: http://discovery-server:8761/eureka/
      AI_DB_HOST: postgres
      AI_DB_PORT: 5432
      AI_DB_NAME: ai_service_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      job-service:
        condition: service_healthy
      candidate-service:
        condition: service_healthy
      recruiter-service:
        condition: service_healthy
      application-service:
        condition: service_healthy
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
