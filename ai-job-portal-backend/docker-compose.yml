name: ai-job-portal

networks:
  ai-job-portal-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:

services:

  # ----------------------------------------------------------------------
  # PostgreSQL — single container, multiple databases (one per microservice)
  # ----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ai-job-portal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # No POSTGRES_DB set on purpose — per-service databases are created
      # by the init script below instead of relying on the single-DB
      # default behavior of the official image.
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------
  # Redis — caching + rate limiting
  # ----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai-job-portal-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------
  # Kafka — KRaft mode (no Zookeeper), single-broker, dev/local setup
  # ----------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.0
    container_name: ai-job-portal-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:${KAFKA_CONTROLLER_PORT:-9093}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:${KAFKA_CONTROLLER_PORT:-9093}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "ai-jobportal-kraft-cluster-01"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------
  # Discovery Server — Eureka
  # ----------------------------------------------------------------------
  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: ai-job-portal-discovery-server
    restart: unless-stopped
    ports:
      - "${EUREKA_PORT:-8761}:8761"
    environment:
      EUREKA_HOSTNAME: discovery-server
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------
  # Config Server — native file-based config, depends on Eureka being up
  # ----------------------------------------------------------------------
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: ai-job-portal-config-server
    restart: unless-stopped
    ports:
      - "${CONFIG_SERVER_PORT:-8888}:8888"
    environment:
      CONFIG_REPO_PATH: /config-repo
      EUREKA_URI: http://discovery-server:8761/eureka/
    volumes:
      - ./config-repo:/config-repo:ro
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------
  # API Gateway — depends on Config Server, Eureka, and Redis
  # ----------------------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: ai-job-portal-api-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      CONFIG_SERVER_URI: http://config-server:8888
      EUREKA_URI: http://discovery-server:8761/eureka/
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-job-portal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
