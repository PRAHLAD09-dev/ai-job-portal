# api-gateway.yml — fetched by the API Gateway service at startup
# (spring.application.name=api-gateway in the gateway's bootstrap config
# tells Config Server to merge this file with the shared application.yml).
#
# Route definitions for business microservices are added incrementally as
# each service is implemented (Auth, Candidate, Recruiter, Job, Application,
# AI, Notification). The auth-service and candidate-service routes below
# were added once each service was implemented and registered in Eureka;
# remaining business service routes will be added the same way in their
# own development phase.

server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      routes:
        # ---- SAFETY NET: never let internal-only, service-to-service
        # endpoints (Auth/Recruiter/Job/Application/AI/Notification's
        # "/internal/**" paths, added for Admin Service per
        # DAY09_ADMIN_SERVICE.md) reach the public internet through this
        # gateway. Every one of them already independently requires the
        # shared X-Internal-Service-Token header (InternalServiceAuthFilter),
        # but blocking the path here too — BEFORE the broader per-service
        # routes below get a chance to match — is a second, independent
        # layer of protection against a leaked/guessed token being usable
        # from outside the Docker network. This route is listed first
        # deliberately: Spring Cloud Gateway evaluates routes in list order
        # and stops at the first predicate match.
        - id: block-internal-service-endpoints
          uri: no://op
          predicates:
            - Path=/api/v1/*/internal/**
          filters:
            - SetStatus=404
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**
        - id: candidate-service
          uri: lb://CANDIDATE-SERVICE
          predicates:
            - Path=/api/v1/candidate/**
        - id: recruiter-service-companies
          uri: lb://RECRUITER-SERVICE
          predicates:
            - Path=/api/v1/companies/**
        - id: recruiter-service-profile
          uri: lb://RECRUITER-SERVICE
          predicates:
            - Path=/api/v1/recruiter/**
        - id: job-service-jobs
          uri: lb://JOB-SERVICE
          predicates:
            - Path=/api/v1/jobs/**
        - id: job-service-categories
          uri: lb://JOB-SERVICE
          predicates:
            - Path=/api/v1/job-categories/**
        - id: application-service-candidate
          uri: lb://APPLICATION-SERVICE
          predicates:
            - Path=/api/v1/applications/**
        - id: application-service-recruiter
          uri: lb://APPLICATION-SERVICE
          predicates:
            - Path=/api/v1/recruiter/applications/**
        - id: ai-service
          uri: lb://AI-SERVICE
          predicates:
            - Path=/api/v1/ai/**
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notifications/**
        # ---- Admin Service (DAY09_ADMIN_SERVICE.md) ----
        # Every /api/v1/admin/** endpoint additionally requires an
        # ADMIN/SUPER_ADMIN-scoped bearer token, enforced by Admin
        # Service's own SecurityConfig — the gateway route below only
        # handles discovery/load-balancing, never authorization.
        - id: admin-service
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/api/v1/admin/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "${FRONTEND_ORIGIN:http://localhost:5173}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

app:
  rate-limiter:
    # Default token bucket settings for Redis-backed rate limiting.
    # AI-related routes will be configured with stricter limits once
    # the AI Service route is added.
    replenish-rate: 20
    burst-capacity: 40
    requested-tokens: 1

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId}]"
