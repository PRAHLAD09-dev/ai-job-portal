# recruiter-service.yml — fetched by the Recruiter Service at startup
# (spring.application.name=recruiter-service in the service's bootstrap
# config tells Config Server to merge this file with the shared
# application.yml).
#
# All secrets, credentials, and environment-specific values are sourced
# exclusively from environment variables — never hardcoded here.

server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://${RECRUITER_DB_HOST:localhost}:${RECRUITER_DB_PORT:5432}/${RECRUITER_DB_NAME:recruiter_service_db}
    username: ${RECRUITER_DB_USERNAME:${POSTGRES_USER}}
    password: ${RECRUITER_DB_PASSWORD:${POSTGRES_PASSWORD}}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: ${COMPANY_ASSET_MAX_FILE_SIZE:5MB}
      max-request-size: ${COMPANY_ASSET_MAX_REQUEST_SIZE:5MB}

# ---- JWT ----
# Must match the EXACT same secret/issuer configured on the Auth Service
# (this service only verifies tokens, never issues them). No default
# value on purpose: fail fast at startup rather than silently trust an
# unset/guessable key.
app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ai-job-portal-auth-service

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

  company-asset:
    max-file-size-bytes: ${COMPANY_ASSET_MAX_FILE_SIZE_BYTES:5242880}   # 5 MB
    allowed-formats: jpg,jpeg,png,webp
    logo-cloudinary-folder: ${COMPANY_LOGO_CLOUDINARY_FOLDER:ai-job-portal/company-logos}
    banner-cloudinary-folder: ${COMPANY_BANNER_CLOUDINARY_FOLDER:ai-job-portal/company-banners}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId}]"

# Binds the "recruiterService" circuit breaker/retry instance (used when
# calling Auth Service via Feign) to the shared "default" Resilience4j
# config declared in config-repo/application.yml.
resilience4j:
  circuitbreaker:
    instances:
      recruiterService:
        baseConfig: default
  retry:
    instances:
      recruiterService:
        baseConfig: default
