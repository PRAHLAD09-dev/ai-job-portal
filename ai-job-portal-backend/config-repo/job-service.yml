# job-service.yml — fetched by the Job Service at startup
# (spring.application.name=job-service in the service's bootstrap
# config tells Config Server to merge this file with the shared
# application.yml).
#
# All secrets, credentials, and environment-specific values are sourced
# exclusively from environment variables — never hardcoded here.

server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://${JOB_DB_HOST:localhost}:${JOB_DB_PORT:5432}/${JOB_DB_NAME:job_service_db}
    username: ${JOB_DB_USERNAME:${POSTGRES_USER}}
    password: ${JOB_DB_PASSWORD:${POSTGRES_PASSWORD}}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ---- JWT ----
# Must match the EXACT same secret/issuer configured on the Auth Service
# (this service only verifies tokens, never issues them). No default
# value on purpose: fail fast at startup rather than silently trust an
# unset/guessable key.
app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ai-job-portal-auth-service

  # ---- Internal service-to-service authentication ----
  # Added for Admin Service (DAY09_ADMIN_SERVICE.md): validates the shared
  # secret header sent by InternalServiceAuthFilter callers (Admin Service
  # managing jobs). Mirrors the identical property already used by Auth
  # Service. No default value on purpose: fail fast at startup rather than
  # silently accept a guessable key.
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId}]"

# Binds the "jobService" circuit breaker/retry instance (used when
# calling Recruiter Service via Feign) to the shared "default"
# Resilience4j config declared in config-repo/application.yml.
resilience4j:
  circuitbreaker:
    instances:
      jobService:
        baseConfig: default
  retry:
    instances:
      jobService:
        baseConfig: default
