# admin-service.yml — fetched by the Admin Service at startup
# (spring.application.name=admin-service in the service's bootstrap
# config tells Config Server to merge this file with the shared
# application.yml).
#
# All secrets, credentials, and environment-specific values are sourced
# exclusively from environment variables — never hardcoded here.

server:
  port: ${PORT:8088}

spring:
  datasource:
    url: jdbc:postgresql://${ADMIN_DB_HOST:localhost}:${ADMIN_DB_PORT:5432}/${ADMIN_DB_NAME:admin_service_db}
    username: ${ADMIN_DB_USERNAME:${POSTGRES_USER}}
    password: ${ADMIN_DB_PASSWORD:${POSTGRES_PASSWORD}}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cloud:
    openfeign:
      httpclient:
        # Feign's default client (JDK HttpURLConnection) cannot execute
        # PATCH requests at all - switches to Apache HttpClient5 (feign-hc5
        # dependency, added in admin-service's pom.xml), which supports it.
        hc5:
          enabled: true

# ---- JWT ----
# Must match the EXACT same secret/issuer configured on the Auth Service
# (this service only verifies tokens, never issues them). No default
# value on purpose: fail fast at startup rather than silently trust an
# unset/guessable key.
app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ai-job-portal-auth-service

  # ---- Internal service-to-service authentication ----
  # Unlike every other service, Admin Service is exclusively a CALLER of
  # this token (via FeignClientConfig's request interceptor) rather than
  # a validator of it — it has no internal-only endpoints of its own for
  # another service to call. Same shared secret as everywhere else.
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId}]"

# Binds every downstream Feign client's circuit breaker/retry instance
# to the shared "default" Resilience4j config declared in
# config-repo/application.yml. "dashboard" additionally declares a
# fallbackMethod (DashboardServiceImpl#getDashboardFallback) so a single
# failing downstream statistic degrades the dashboard gracefully instead
# of failing the whole page.
resilience4j:
  circuitbreaker:
    instances:
      authService:
        baseConfig: default
      recruiterService:
        baseConfig: default
      jobService:
        baseConfig: default
      applicationService:
        baseConfig: default
      aiService:
        baseConfig: default
      notificationService:
        baseConfig: default
      dashboard:
        baseConfig: default
  retry:
    instances:
      authService:
        baseConfig: default
      recruiterService:
        baseConfig: default
      jobService:
        baseConfig: default
      applicationService:
        baseConfig: default
      aiService:
        baseConfig: default
      notificationService:
        baseConfig: default

# ---- Cross-platform Feign target overrides ----
# admin-service is a Feign *client* to six other services (auth, job,
# recruiter, application, ai, notification). Normally it reaches them via
# Eureka load-balancing (lb://SERVICE-NAME), which resolves to each
# service's registered hostname. If every service is on the same platform
# (e.g. all on Railway, registered via RAILWAY_PRIVATE_DOMAIN), that works
# fine. But if admin-service itself is deployed on a DIFFERENT platform
# (e.g. Render), it cannot resolve another platform's private/internal
# hostname at all — every downstream call fails immediately.
#
# Leave these blank (default) when admin-service is on the same platform
# as the other services. Set them to each service's public URL (its
# https://xxx.up.railway.app address) when admin-service is deployed
# elsewhere — this makes the Feign client call that fixed public URL
# directly, bypassing Eureka load-balancing for that client only.
services:
  auth-service:
    url: ${AUTH_SERVICE_URL:}
  job-service:
    url: ${JOB_SERVICE_URL:}
  recruiter-service:
    url: ${RECRUITER_SERVICE_URL:}
  application-service:
    url: ${APPLICATION_SERVICE_URL:}
  ai-service:
    url: ${AI_SERVICE_URL:}
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:}
