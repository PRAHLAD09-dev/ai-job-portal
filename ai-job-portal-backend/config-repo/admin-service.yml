# admin-service.yml — fetched by the Admin Service at startup
# (spring.application.name=admin-service in the service's bootstrap
# config tells Config Server to merge this file with the shared
# application.yml).
#
# All secrets, credentials, and environment-specific values are sourced
# exclusively from environment variables — never hardcoded here.

server:
  port: 8088

spring:
  datasource:
    url: jdbc:postgresql://${ADMIN_DB_HOST:localhost}:${ADMIN_DB_PORT:5432}/${ADMIN_DB_NAME:admin_service_db}
    username: ${ADMIN_DB_USERNAME:${POSTGRES_USER}}
    password: ${ADMIN_DB_PASSWORD:${POSTGRES_PASSWORD}}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ---- JWT ----
# Must match the EXACT same secret/issuer configured on the Auth Service
# (this service only verifies tokens, never issues them). No default
# value on purpose: fail fast at startup rather than silently trust an
# unset/guessable key.
app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ai-job-portal-auth-service

  # ---- Internal service-to-service authentication ----
  # Unlike every other service, Admin Service is exclusively a CALLER of
  # this token (via FeignClientConfig's request interceptor) rather than
  # a validator of it — it has no internal-only endpoints of its own for
  # another service to call. Same shared secret as everywhere else.
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId}]"

# Binds every downstream Feign client's circuit breaker/retry instance
# to the shared "default" Resilience4j config declared in
# config-repo/application.yml. "dashboard" additionally declares a
# fallbackMethod (DashboardServiceImpl#getDashboardFallback) so a single
# failing downstream statistic degrades the dashboard gracefully instead
# of failing the whole page.
resilience4j:
  circuitbreaker:
    instances:
      authService:
        baseConfig: default
      recruiterService:
        baseConfig: default
      jobService:
        baseConfig: default
      applicationService:
        baseConfig: default
      aiService:
        baseConfig: default
      notificationService:
        baseConfig: default
      dashboard:
        baseConfig: default
  retry:
    instances:
      authService:
        baseConfig: default
      recruiterService:
        baseConfig: default
      jobService:
        baseConfig: default
      applicationService:
        baseConfig: default
      aiService:
        baseConfig: default
      notificationService:
        baseConfig: default
