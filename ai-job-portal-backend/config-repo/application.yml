# application.yml (no profile suffix) is shared by ALL clients of the Config
# Server (every microservice that sets spring.application.name and points
# spring.cloud.config.uri at this server will get this file's properties
# merged with their own <service-name>.yml).
#
# Only TRULY shared, cross-cutting defaults belong here. Service-specific
# settings (server.port, datasource URL/db name, feature flags) belong in
# each service's own <service-name>.yml file in this same config-repo.

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Every @KafkaListener in this codebase deliberately declares a raw
      # String payload and parses it itself with ObjectMapper.readValue(...)
      # into its OWN locally-declared mirror DTO (see AiEventConsumer's and
      # NotificationEventConsumer's class-level javadoc) — producer and
      # consumer live in different services/packages, so the producer's
      # fully-qualified class name is never resolvable on the consumer's
      # classpath. JsonDeserializer was wired here regardless, and it still
      # tries to resolve that unresolvable producer class name from the
      # Kafka __TypeId__ header BEFORE the message ever reaches the listener
      # method — causing a ClassNotFoundException poison-pill loop that
      # blocks the partition forever. StringDeserializer matches what every
      # listener actually expects and lets each consumer's manual parsing
      # (which already ignores the type header) do its job.
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

  health:
    mail:
      enabled: false

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId}]"

# Resilience4j shared defaults; individual services may override per-CircuitBreaker
# instance name (e.g. "candidateService", "aiService") in their own config.
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        # A downstream 404 (decoded by FeignErrorDecoder into
        # ResourceNotFoundException) is a legitimate business outcome, not a
        # sign that the dependency is unreachable. Without this, every 404
        # was counted as a circuit-breaker failure AND routed through each
        # caller's fallbackMethod, which unconditionally rethrows a generic
        # "<Service> is temporarily unavailable" 503 - masking real 404s
        # (e.g. GET /recruiter/profile for a recruiter who hasn't finished
        # onboarding) as a fake 503.
        ignoreExceptions:
          - com.prahlad.aijobportal.common.exception.ResourceNotFoundException
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        ignoreExceptions:
          - com.prahlad.aijobportal.common.exception.ResourceNotFoundException
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
