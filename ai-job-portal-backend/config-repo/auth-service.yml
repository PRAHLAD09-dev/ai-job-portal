# auth-service.yml — fetched by the Auth Service at startup
# (spring.application.name=auth-service in the service's bootstrap config
# tells Config Server to merge this file with the shared application.yml).
#
# All secrets, credentials, and environment-specific values are sourced
# exclusively from environment variables (ultimately populated from the
# project's .env file via docker-compose) — never hardcoded here.

server:
  port: ${PORT:8081}

spring:
  datasource:
    url: jdbc:postgresql://${AUTH_DB_HOST:localhost}:${AUTH_DB_PORT:5432}/${AUTH_DB_NAME:auth_service_db}
    username: ${AUTH_DB_USERNAME:${POSTGRES_USER}}
    password: ${AUTH_DB_PASSWORD:${POSTGRES_PASSWORD}}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ---- JWT ----
# JWT_SECRET / JWT_REFRESH_SECRET are mandatory environment variables with
# NO default value here on purpose: the service must fail fast at startup
# rather than silently sign tokens with a guessable fallback secret.
app:
  jwt:
    secret: ${JWT_SECRET}
    refresh-secret: ${JWT_REFRESH_SECRET}
    issuer: ai-job-portal-auth-service
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}        # 15 minutes
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}   # 7 days

  auth:
    email-verification-token-expiration-ms: ${EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS:86400000}  # 24 hours
    password-reset-token-expiration-ms: ${PASSWORD_RESET_TOKEN_EXPIRATION_MS:3600000}            # 1 hour
    max-failed-login-attempts: ${MAX_FAILED_LOGIN_ATTEMPTS:5}
    frontend-verify-email-url: ${FRONTEND_VERIFY_EMAIL_URL:http://localhost:5173/verify-email}
    frontend-reset-password-url: ${FRONTEND_RESET_PASSWORD_URL:http://localhost:5173/reset-password}

  mail:
    from: ${MAIL_FROM:no-reply@aijobportal.com}
    from-name: ${MAIL_FROM_NAME:AI Job Portal}

  # ---- Brevo transactional email API ----
  # Railway (and most PaaS free tiers) block outbound SMTP, so e-mail is
  # sent over Brevo's HTTPS API instead of SMTP. No default on purpose:
  # get a free key at https://app.brevo.com (Settings > SMTP & API > API Keys).
  brevo:
    api-key: ${BREVO_API_KEY:}

  # ---- Internal service-to-service authentication ----
  # Validates the shared secret header sent by InternalServiceAuthFilter
  # callers (currently: Notification Service resolving a user's e-mail
  # from a Kafka event's userId). No default value on purpose: fail fast
  # at startup rather than silently accept a guessable key.
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN}

  # ---- First-admin bootstrap (AdminBootstrapRunner) ----
  # There is no self-registration path and no other mechanism to create an
  # ADMIN/SUPER_ADMIN account, so this runs once on startup to create
  # exactly one default administrator if none exists yet. No defaults for
  # email/password on purpose - if unset, the runner logs a warning and
  # skips bootstrap rather than using a guessable credential.
  admin-bootstrap:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:true}
    email: ${ADMIN_BOOTSTRAP_EMAIL:}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:}
    first-name: ${ADMIN_BOOTSTRAP_FIRST_NAME:Platform}
    last-name: ${ADMIN_BOOTSTRAP_LAST_NAME:Administrator}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

  health:
    mail:
      enabled: false

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId}]"
